name: Build Docker Image
on:
  push:
    branches:
      - main
      - develop

defaults:
  run:
    shell: bash
    
jobs:
  tests:
    name: Run code checks and tests
    uses: ./.github/workflows/code-checks.yml
    secrets: inherit
        
  build_docker_image:
    name: Build Image
    runs-on: ubuntu-24.04
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'test' }}
    permissions:
      contents: read
      packages: write
    needs: [tests]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Building and publishing an image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          context: .
          tags: |
            ghcr.io/t0ha/camelotai:latest
            ghcr.io/t0ha/camelotai:${{ github.sha }}

      - name: Deploy Image to CapRrover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: "${{ vars.CAPROVER_SERVER }}"
          app: "${{ vars.APP_NAME }}"
          token: "${{ secrets.APP_TOKEN }}"
          image: "ghcr.io/t0ha/camelotai:${{ github.sha }}"
